<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Ricardo Teixeira</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/projects.css">
</head>

<body>

    <script>
        fetch("header.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("header-placeholder").innerHTML = data;
                document.querySelector("header").classList.add("show");
            });
    </script>

<div id="header-placeholder"></div>

<section class="container">
    <h2>Professional Work</h2>

    <div class="projects-grid" id="projectsGrid"></div>
</section>

<section class="container">
    <h2>All published games</h2>
    <h5>Disclaimer: Most were done on game jams. Some are missing due to lost files</h5>

    <div class="projects-grid" id="personalProjectsGrid"></div>
</section>

<!-- MODAL -->
<div id="projectModal" class="modal">
    <div class="modal-content">

        <span class="close">&times;</span>

        <h2 id="modalTitle"></h2>

        <img id="modalCover" class="modal-cover">

        <!-- TRAILER -->
        <div class="video-container">
            <iframe id="modalVideo" frameborder="0" allowfullscreen></iframe>
        </div>

        <!-- DESCRIPTION -->
        <h3>Description</h3>
        <p id="modalDescription"></p>

        <!-- WHAT I DID -->
        <h3>What I Did</h3>
        <p id="modalRole"></p>

        <!-- SKILLS -->
        <h3>Skills Used / Learned</h3>
        <p id="modalSkills"></p>

    </div>
</div>

<script src="javascripts/projects.js"></script>
</body>

<script>
    fetch("footer.html")
        .then(res => res.text())
        .then(data => {
            document.getElementById("footer-placeholder").innerHTML = data;
        });
</script>
<div id="footer-placeholder"></div>

</html>
